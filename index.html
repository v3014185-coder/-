<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Elite Legion - Interface</title>
    <style>
        :root {
            --primary-red: #ff0033;
            --bg-black: #000000;
            --panel-dark: #050505;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .screen-container {
            width: 100%;
            max-width: 600px;
            min-height: 500px;
            background-color: var(--panel-dark);
            border: 2px solid #333;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        /* Скрываем экраны по умолчанию, показываем только активный */
        .screen {
            width: 100%;
            text-align: center;
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Стили для загрузки */
        .status-text {
            color: var(--primary-red);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #000;
            border: 1px solid #333;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary-red);
            transition: width 2s ease-out;
        }

        .access-status {
            color: #555;
            font-size: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Стили кнопок */
        .btn {
            background: transparent;
            color: var(--primary-red);
            border: 2px solid var(--primary-red);
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.3);
            margin-bottom: 10px;
        }

        .btn:hover {
            background: var(--primary-red);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.8);
        }

        .btn-green {
            background: #0f0;
            color: #000;
            border-color: #0f0;
        }

        /* Стили меню (строго как на скрине) */
        .menu-title {
            color: var(--primary-red);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            display: inline-block;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }

        .menu-grid .btn {
            width: 100%;
        }

        .menu-full-btn {
            width: 100%;
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="screen-container">
    
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="screen-load" class="screen active">
        <div class="status-text" id="statusText">[ СИСТЕМА ЗАГРУЖАЕТСЯ ]</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="access-status" id="accessStatus">Ожидание авторизации…</div>
        <button id="activateBtn" class="btn" disabled>АКТИВИРОВАТЬ ДОСТУП</button>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ (ТОЧНО КАК НА СКРИНЕ) -->
    <div id="screen-main" class="screen">
        <div class="menu-title">[ ГЛАВНОЕ МЕНЮ ]</div>
        <div class="menu-grid">
            <button id="btn-who" class="btn">КТО ТАКИЕ ELITE?</button>
            <button id="btn-rules" class="btn">УСТАВ</button>
        </div>
        <button id="btn-jobs" class="btn menu-full-btn">ВАКАНСИИ</button>
    </div>

</div>

<script>
    // Элементы загрузки
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const accessStatus = document.getElementById('accessStatus');
    const activateBtn = document.getElementById('activateBtn');

    // Элементы экранов
    const screenLoad = document.getElementById('screen-load');
    const screenMain = document.getElementById('screen-main');

    // Логика прогресс-бара
    function startLoading() {
        let width = 0;
        const interval = setInterval(() => {
            width += Math.random() * 10;
            if (width > 100) width = 100;
            progressFill.style.width = width + '%';
            
            if (width >= 100) {
                clearInterval(interval);
                statusText.textContent = '[ СИСТЕМА ГОТОВА ]';
                accessStatus.textContent = 'Доступ разрешён. Нажмите кнопку для входа.';
                activateBtn.disabled = false;
            }
        }, 100);
    }

    // Логика активации с паузой
    activateBtn.addEventListener('click', () => {
        activateBtn.disabled = true;
        activateBtn.textContent = 'ПРОВЕРКА ДОСТУПА…';
        activateBtn.classList.add('btn-green');
        
        setTimeout(() => {
            statusText.textContent = '[ ДОСТУП РАЗРЕШЁН ]';
            accessStatus.textContent = 'Загрузка интерфейса…';
            activateBtn.textContent = 'ДОСТУП АКТИВИРОВАН';
            
            // ПАУЗА 4 СЕКУНДЫ (4000 мс) — как ты просил
            setTimeout(() => {
                screenLoad.classList.remove('active');
                screenMain.classList.add('active');
            }, 4000);
        }, 1500);
    });

    // Заглушки для кнопок (чтобы при клике не было ошибок)
    document.getElementById('btn-who').addEventListener('click', () => alert('Информация о подразделении Elite'));
    document.getElementById('btn-rules').addEventListener('click', () => alert('Текст устава'));
    document.getElementById('btn-jobs').addEventListener('click', () => alert('Список вакансий'));

    // Старт
    startLoading();
</script>

</body>
</html>
