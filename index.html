<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Legion - Interface</title>
    <style>
        :root {
            --primary-red: #ff0033;
            --bg-black: #000000;
            --panel-dark: #050505;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .screen-container {
            width: 100%;
            max-width: 800px;
            min-height: 750px;
            background-color: var(--panel-dark);
            border: 2px solid #333;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Шум (noise) */
        .noise-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise' color-interpolation-filters='sRGB'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.12'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: overlay;
        }

        .screen-border {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 4px solid #111;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.2);
            pointer-events: none;
            z-index: 10;
        }

        /* Глитч-слой */
        .glitch-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 51, 0.35);
            z-index: 1000;
            pointer-events: none;
            display: none;
            isolation: isolate;
        }
        .glitch-active {
            display: block;
        }

        /* Цветные сдвиги (RGB split) */
        .glitch-effect::before,
        .glitch-effect::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .glitch-active::before {
            mix-blend-mode: difference;
            filter: hue-rotate(180deg);
            clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
            animation: glitchShift 0.15s infinite alternate;
        }
        .glitch-active::after {
            mix-blend-mode: screen;
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
            animation: glitchShift 0.18s infinite alternate reverse;
        }
        @keyframes glitchShift {
            from { transform: translateX(-15px) translateY(-15px); }
            to   { transform: translateX(15px) translateY(15px); }
        }

        /* Системный лог */
        .system-log-container {
            position: fixed;
            top: 20px; right: 20px;
            width: 250px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            color: #ff0033;
            font-size: 12px;
            padding: 10px;
            z-index: 2000;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.2);
            overflow-y: auto;
            max-height: 300px;
            backdrop-filter: blur(2px);
        }
        .log-header {
            color: #555;
            text-transform: uppercase;
            font-size: 10px;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
        .log-entry {
            margin-bottom: 4px;
            padding-left: 10px;
            border-left: 2px solid #ff0033;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Меню */
        .menu-box {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            text-align: center;
            z-index: 20;
        }
        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-red);
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 51, 0.8);
        }
        .text-area {
            background-color: #000;
            color: var(--primary-red);
            border: 1px solid #333;
            padding: 20px;
            min-height: 250px;
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            z-index: 2;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .text-area::-webkit-scrollbar { display: none; }

        /* Вакансии */
        .vacancy-list { list-style: none; padding: 0; margin: 0; }
        .vacancy-item {
            background: #0f0f0f;
            border-left: 3px solid #ff0033;
            padding: 12px 15px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #fff;
            text-align: left;
            box-sizing: border-box;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .vacancy-item:hover {
            transform: translateX(10px);
            background: #1a1a1a;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.5);
            border-left-color: #fff;
        }
        .vacancy-item strong {
            color: var(--primary-red);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px;
            border-bottom: 1px dashed #333;
            padding-bottom: 2px;
        }
        .vacancy-item span { font-size: 12px; color: #aaa; }
        .risk-indicator {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%);
            width: 4px; height: 20px;
            background: #333; border-radius: 2px; overflow: hidden;
        }
        .risk-fill {
            height: 0%; width: 100%; background: var(--primary-red);
            transition: height 0.5s ease;
        }
        .vacancy-item:hover .risk-fill { height: 100%; }

        /* Кнопки */
        .btn {
            background: transparent; color: var(--primary-red);
            border: 2px solid var(--primary-red);
            padding: 15px 30px; font-family: 'Courier New', monospace;
            font-size: 14px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            width: 100%; margin-bottom: 10px; transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.3);
            position: relative; z-index: 2;
        }
        .btn:hover {
            background: var(--primary-red); color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.8);
        }
        .btn-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%;
        }
        @media (min-width: 600px) { .btn-grid { grid-template-columns: 1fr 1fr; } }

        /* Прогресс-бар */
        .progress-bar-bg {
            width: 100%; height: 10px; background: #000;
            border: 1px solid #333; margin-top: 20px; overflow: hidden;
        }
        .progress-bar-fill {
            width: 0%; height: 100%; background: var(--primary-red);
            transition: width 2s ease-out;
        }
        .access-status {
            margin-top: 10px; color: #555; font-size: 12px;
        }

        /* Модальное окно */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 3000;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #000; border: 2px solid var(--primary-red);
            padding: 30px; width: 400px; color: #fff; text-align: center;
        }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label {
            display: block; color: var(--primary-red); margin-bottom: 5px;
            font-size: 12px;
        }
        .form-group input {
            width: 100%; background: #111; border: 1px solid #333;
            color: #fff; padding: 8px; font-family: inherit;
        }
        .submit-loader {
            display: none; color: var(--primary-red);
            margin-top: 10px; font-size: 12px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="screen-container">
        <div class="noise-overlay"></div>
        <div class="screen-border"></div>
        <!-- Глитч-эффект (RGB + тряска) -->
        <div class="glitch-effect" id="glitch-layer"></div>

        <!-- ЭКРАН 1: Старт -->
        <div id="start-menu" class="menu-box">
            <div class="section-title">[ СИСТЕМА ЗАГРУЖАЕТСЯ ]</div>
            <p style="margin-bottom: 30px; color: #555;">Ожидание авторизации...</p>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="access-status" id="status-text">[ ДОСТУП: ОГРАНИЧЕН ]</div>
            <button id="activate-btn" class="btn" style="margin-top: 20px;">АКТИВИРОВАТЬ ДОСТУП</button>
        </div>

        <!-- ЭКРАН 2: Главное меню -->
        <div id="buttons-menu" class="menu-box hidden">
            <div class="section-title">[ ГЛАВНОЕ МЕНЮ ]</div>
            <div class="text-area" id="main-text-display"></div>
            <div class="btn-grid">
                <button id="btn-who" class="btn">КТО ТАКИЕ ELITE?</button>
                <button id="btn-rules" class="btn">УСТАВ И ЕГО СУТЬ</button>
                <button id="btn-jobs" class="btn">ВАКАНСИИ</button>
            </div>
        </div>

        <!-- ЭКРАН 3: Кто такие ELITE -->
        <div id="text-menu" class="menu-box hidden">
            <div class="section-title">[ ИНФОРМАЦИЯ: КТО ТАКИЕ ELITE ]</div>
            <div class="text-area" data-text="ELITE — Гвардия отдела Metro Police Forces и Overwatch Transhuman Arms, одно из подразделений, созданное Генеральным Штабом Сити-17. В данное подразделение входят строго лучшие юниты из рядов всех Гарнизонов ГО и OTA. Подразделение имеет дополнительные корпуса: Корпус юстиции и Корпус командования. Подразделение занимается строгим надзором за соблюдением устава среди остальных юнитов ГО, а в случае нарушения — его пресечением и вынесением приговора. Для остальных юнитов ГО они являются строгим образцом и фигурой ГО, на которую стоит ровняться."></div>
            <button id="btn-back-who" class="btn">НАЗАД</button>
        </div>

        <!-- ЭКРАН 4: Устав -->
        <div id="rules-menu" class="menu-box hidden">
            <div class="section-title">[ ИНФОРМАЦИЯ: УСТАВ ]</div>
            <div class="text-area" data-text="Устав — это свод правил, который задаёт порядок работы и поведения в какой‑либо организации или структуре. В Уставе есть 8 пунктов. Он регламентирует все аспекты деятельности подразделения, включая субординацию, применение силы и порядок взаимодействия с гражданскими лицами."></div>
            <div style="margin-bottom: 15px; text-align: left;">
