<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Legion - Interface</title>
    <style>
        body {
            background-color: #000000;
            color: #ff0033;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .screen-container {
            width: 100%;
            max-width: 800px;
            min-height: 750px;
            background-color: #050505;
            border: 2px solid #333;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .power-up-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 0, 51, 0.8) 0%, rgba(0,0,0,1) 100%);
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease-out;
        }
        
        .static-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise' color-interpolation-filters='sRGB'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
            z-index: 9;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.5s ease-out;
        }

        .screen-border {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 4px solid #111;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.2);
            pointer-events: none;
        }

        .menu-box {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
            text-align: center;
        }

        .menu-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 3px solid #ff0033;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.4);
            pointer-events: none;
            z-index: 1;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff0033;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 51, 0.8);
        }

        .text-area {
            background-color: #000;
            color: #ff0033;
            border: 1px solid #333;
            padding: 20px;
            min-height: 250px;
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            z-index: 2;
            overflow-y: auto;
        }
        
        .text-area::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,0,51,0.05) 50%, transparent 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            opacity: 0.6;
        }

        .btn {
            background: transparent;
            color: #ff0033;
            border: 2px solid #ff0033;
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-bottom: 10px;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.3);
            position: relative;
            z-index: 2;
        }

        .btn:hover {
            background: #ff0033;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.8);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
        }
        @media (min-width: 600px) {
            .btn-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .hidden {
            display: none !important;
        }

        .cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: #ff0033;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .noise-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise' color-interpolation-filters='sRGB'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            mix-blend-mode: overlay;
        }
    </style>
</head>
<body>

    <div class="screen-container">
        <div class="noise-overlay"></div>
        <div class="screen-border"></div>
        <div class="power-up-layer" id="power-up"></div>
        <div class="static-layer" id="static-start"></div>

        <!-- ЭКРАН 1: Старт -->
        <div id="start-menu" class="menu-box">
            <div class="section-title">[ СИСТЕМА ЗАГРУЖАЕТСЯ ]</div>
            <p style="margin-bottom: 30px; color: #555;">Ожидание авторизации...</p>
            <button id="activate-btn" class="btn">АКТИВИРОВАТЬ ДОСТУП</button>
        </div>

        <!-- ЭКРАН 2: Главное меню -->
        <div id="buttons-menu" class="menu-box hidden">
            <div class="section-title">[ ГЛАВНОЕ МЕНЮ ]</div>
            <div class="text-area" id="main-text-display"></div>
            <div class="btn-grid">
                <button id="btn-who" class="btn">КТО ТАКИЕ ELITE?</button>
                <button id="btn-rules" class="btn">УСТАВ И ЕГО СУТЬ</button>
                <button id="btn-jobs" class="btn">ВАКАНСИИ</button>
            </div>
        </div>

        <!-- ЭКРАН 3: Кто такие ELITE -->
        <div id="text-menu" class="menu-box hidden">
            <div class="section-title">[ ИНФОРМАЦИЯ: КТО ТАКИЕ ELITE ]</div>
            <div class="text-area" data-text="ELITE - Гвардия отдела Metro Police Forces и Overwatch Transhuman Arms, одно из подразделений, созданное Генеральным Штабом Сити-17. В данное подразделение входят строго лучшие юниты из рядов всех Гарнизонов ГО и OTA. Подразделение имеет дополнительные корпуса: Корпус юстиции и Корпус Командования. Подразделение занимается строгим надзором за соблюдением устава среди остальных юнитов ГО, а в случае нарушения — его пресечением и вынесением приговора. Для остальных юнитов ГО они являются строгим образцом и фигурой ГО, на которую стоит ровняться."></div>
            <button id="btn-back-who" class="btn">НАЗАД</button>
        </div>

        <!-- ЭКРАН 4: Устав -->
        <div id="rules-menu" class="menu-box hidden">
            <div class="section-title">[ ИНФОРМАЦИЯ: УСТАВ ]</div>
            <div class="text-area" data-text="Устав — это свод правил, который задаёт порядок работы и поведения в какой‑либо организации или структуре. В Уставе есть 8 пунктов. Он регламентирует все аспекты деятельности подразделения, включая субординацию, применение силы и порядок взаимодействия с гражданскими лицами."></div>
            <div style="margin-bottom: 15px; text-align: left;">
                <a href="https://docs.google.com/document/d/12YHZ9wqK59BK2zrPSvtvBxufcNWw3qUcNFpjO8pY9pU/edit?tab=t.0#heading=h.12wixb4wwso0" target="_blank" style="color: #ff0033; text-decoration: none; border-bottom: 1px dashed #ff0033;">ОТКРЫТЬ УСТАВ</a>
            </div>
            <button id="btn-back-rules" class="btn">НАЗАД</button>
        </div>

        <!-- ЭКРАН 5: Вакансии -->
        <div id="jobs-menu" class="menu-box hidden">
            <div class="section-title">[ ДОСТУПНЫЕ ВАКАНСИИ ]</div>
            <div class="text-area" data-text="1. C17.MPF.ELITE.JURY.OFC - Юнит Гражданской Обороны MPF под названием Элит либо ELITE. Занимается слежкой за соблюдением устава сотрудников Г.О. Также следят за порядком и дисциплиной, выявляют дефекты и отклонения. 2. C17.MPF.ELITE.CMD.OFC - Офицер командования ELITE, координирует действия групп и принимает решения в критических ситуациях."></div>
            <button id="btn-back-jobs" class="btn">НАЗАД</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const startMenu = document.getElementById('start-menu');
            const buttonsMenu = document.getElementById('buttons-menu');
            const textMenu = document.getElementById('text-menu');
            const rulesMenu = document.getElementById('rules-menu');
            const jobsMenu = document.getElementById('jobs-menu');

            const activateBtn = document.getElementById('activate-btn');
            const btnWho = document.getElementById('btn-who');
            const btnRules = document.getElementById('btn-rules');
            const btnJobs = document.getElementById('btn-jobs');

            const btnBackWho = document.getElementById('btn-back-who');
            const btnBackRules = document.getElementById('btn-back-rules');
            const btnBackJobs = document.getElementById('btn-back-jobs');

            const mainTextDisplay = document.getElementById('main-text-display');

            const powerUp = document.getElementById('power-up');
            const staticStart = document.getElementById('static-start');

            let typingTimers = [];

            function stopTyping() {
                typingTimers.forEach(timer => clearTimeout(timer));
                typingTimers = [];
            }

            function typeWriter(element) {
                stopTyping();
                element.innerHTML = '';
                
                const text = element.getAttribute('data-text');
                if (!text) return;

                let i = 0;
                const speed = 20;

                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                        const timer = setTimeout(type, speed);
                        typingTimers.push(timer);
                    }
                }
                type();
            }

            activateBtn.addEventListener('click', () => {
                powerUp.style.opacity = '0';
                staticStart.style.opacity = '0';

                setTimeout(() => {
                    startMenu.classList.add('hidden');
                    buttonsMenu.classList.remove('hidden');
                    
                    mainTextDisplay.setAttribute('data-text', 'Система ELITE Legion активна. Выберите интересующий раздел информации.');
                    typeWriter(mainTextDisplay);
                }, 1500);
            });

            btnWho.addEventListener('click', () => {
                buttonsMenu.classList.add('hidden');
                textMenu.classList.remove('hidden');
                const textEl = textMenu.querySelector('.text-area');
                if (textEl) typeWriter(textEl);
            });

            btnRules.addEventListener('click', () => {
                buttonsMenu.classList.add('hidden');
                rulesMenu.classList.remove('hidden');
                const textEl = rulesMenu.querySelector('.text-area');
                if (textEl) typeWriter(textEl);
            });

            btnJobs.addEventListener('click', () => {
                buttonsMenu.classList.add('hidden');
                jobsMenu.classList.remove('hidden');
                const textEl = jobsMenu.querySelector('.text-area');
                if (textEl) typeWriter(textEl);
            });

            btnBackWho.addEventListener('click', () => {
                stopTyping();
                textMenu.classList.add('hidden');
                buttonsMenu.classList.remove('hidden');
            });

            btnBackRules.addEventListener('click', () => {
                stopTyping();
                rulesMenu.classList.add('hidden');
                buttonsMenu.classList.remove('hidden');
            });

            btnBackJobs.addEventListener('click', () => {
                stopTyping();
                jobsMenu.classList.add('hidden');
                buttonsMenu.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
