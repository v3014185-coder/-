<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Legion - Interface</title>
    <style>
        :root {
            --bg-color: #050508;       /* Почти черный, но не абсолютный */
            --glass-bg: rgba(20, 20, 25, 0.75);
            --neon-red: #ff0055;
            --neon-glow: 0 0 10px rgba(255, 0, 85, 0.5);
            --text-main: #e0e0e0;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            /* Добавляем легкую сетку на фон, чтобы было видно, что это интерфейс */
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Эффект "стекла" для контейнера */
        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px); /* Размытие фона под контейнером */
            border: 1px solid var(--border-color);
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* Заголовок с неоновой обводкой */
        h1.title {
            color: var(--neon-red);
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
            margin-bottom: 40px;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.8);
            position: relative;
        }

        /* Стилизация кнопок */
        .btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        /* Эффект при наведении на кнопку */
        .btn:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            color: var(--neon-red);
            transform: scale(1.02);
        }

        /* "Голографический" блик внутри кнопки */
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
            z-index: -1;
        }

        .btn:hover::after {
            left: 100%;
        }

        /* Блок информации */
        #info-block {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            color: var(--neon-red);
            display: none;
            text-align: left;
            font-size: 12px;
            line-height: 1.5;
            border-left: 3px solid var(--neon-red);
        }

        /* Экран вакансий */
        .jobs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 400px) {
            .jobs-grid { grid-template-columns: 1fr 1fr; }
        }

        .job-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            padding: 15px;
            color: var(--neon-red);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 0.3s;
        }

        .job-card:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .job-code {
            font-family: inherit;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .job-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.3;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--neon-red);
        }
        .form-group { margin-bottom: 15px; }
        .form-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ -->
        <div id="screen-menu" class="content-screen active-screen">
            <h1 class="title">[ МЕНЮ ]</h1>
            <button class="btn" onclick="showInfo('elite')">КТО ТАКИЕ ELITE?</button>
            <button class="btn" onclick="showInfo('rules')">УСТАВ</button>
            <button class="btn" style="margin-top: 20px; border-color: var(--neon-red); color: var(--neon-red;" onclick="goToJobs()">ВАКАНСИИ</button>
            
            <div id="info-block"></div>
        </div>

        <!-- ЭКРАН 2: ВАКАНСИИ -->
        <div id="screen-jobs" class="content-screen">
            <h1 class="title">[ ВАКАНСИИ ]</h1>
            
            <div class="jobs-grid">
                <div class="job-card">
                    <span class="job-code">C17.MPF.ELITE.JURY.OFC</span>
                    <span class="job-desc">Юнит Гражданской Обороны. Контроль порядка. Требуется дисциплина.</span>
                </div>
                <div class="job-card">
                    <span class="job-code">C17.OTA.ELITE.LEGION</span>
                    <span class="job-desc">Экспериментальные единицы ОТА. Высокий риск. Только опытные.</span>
                </div>
            </div>

            <button class="btn" onclick="openModal()">ПОДАТЬ ЗАЯВКУ</button>
            <button class="btn" onclick="goBack()">НАЗАД В МЕНЮ</button>
        </div>

    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--neon-red); margin-top:0; text-align:center;">ЗАЯВКА</h3>
            <div class="form-group">
                <label style="color:#666; font-size:10px;">Код вакансии</label>
                <input type="text" id="modal-code" class="form-input" readonly value="C17.MPF.ELITE.JURY.OFC">
            </div>
            <div class="form-group">
                <label style="color:#666; font-size:10px;">Никнейм</label>
                <input type="text" class="form-input" placeholder="Ваш ник" required>
            </div>
            <button class="btn" style="width:auto; margin:0 auto; display:block; border-color: var(--neon-red); color: var(--neon-red;" onclick="submitApp()">ОТПРАВИТЬ</button>
            <button class="btn" style="width:auto; margin:10px auto 0; display:block; background:none; color:#666; border-color: #333;" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

<script>
    // --- ФУНКЦИИ ПЕРЕХОДОВ ---
    function goToJobs() {
        document.getElementById('screen-menu').classList.remove('active-screen');
        document.getElementById('screen-jobs').classList.add('active-screen');
    }

    function goBack() {
        document.getElementById('screen-jobs').classList.remove('active-screen');
        document.getElementById('screen-menu').classList.add('active-screen');
        document.getElementById('info-block').style.display = 'none';
    }

    // --- ИНФОРМАЦИЯ В МЕНЮ ---
    function showInfo(type) {
        const block = document.getElementById('info-block');
        block.style.display = 'block';
        if(type === 'elite') {
            block.innerHTML = '<b>[ ELITE LEGION ]</b><br><br>Элитное подразделение специального назначения. Создано для выполнения задач, где обычные силы бессильны.';
        } else if(type === 'rules') {
            block.innerHTML = '<b>[ УСТАВ ]</b><br><br>1. Приказ старшего по званию — закон.<br>2. Не разглашать секретные данные.<br>3. Соблюдать субординацию.';
        }
    }

    // --- МОДАЛЬНОЕ ОКНО ---
    function openModal() {
        document.getElementById('myModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('myModal').style.display = 'none';
    }

    function submitApp() {
        alert('Заявка успешно отправлена в штаб-квартиру Elite Legion.');
        closeModal();
    }
</script>

</body>
</html>
