<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Legion - CMD Interface</title>
    <style>
        :root {
            --primary-red: #ff0033;
            --bg-black: #050505;
            --panel-dark: #111;
            --text-white: #ffffff;
            --border-color: #333;
            --card-bg: #000;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* --- СТИЛЬНЫЙ ФОН (НЕ ЛАГАЮЩИЙ) --- */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(255, 0, 51, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 51, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
        }

        /* Легкий шум поверх фона */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--primary-red);
            text-align: center;
        }

        .boot-log { font-size: 12px; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .boot-status { font-size: 16px; margin: 20px 0; font-weight: bold; }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        .screen-container {
            width: 100%;
            max-width: 500px;
            min-height: 500px;
            background-color: var(--panel-dark);
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 10;
        }

        /* --- ЭКРАНЫ (СКРЫТЫЕ ПО УМОЛЧАНИЮ) --- */
        .screen {
            width: 100%;
            text-align: center;
            display: none;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- КНОПКИ --- */
        .btn {
            background: transparent;
            color: var(--primary-red);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn:hover {
            background: var(--primary-red);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.5);
        }

        /* --- ЗАГОЛОВКИ --- */
        .title-red {
            color: var(--primary-red);
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            display: inline-block;
            font-weight: bold;
        }

        /* --- КАРТОЧКИ ВАКАНСИЙ (КУБЫ) --- */
        .jobs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            margin-bottom: 25px;
        }

        @media (min-width: 400px) {
            .jobs-grid { grid-template-columns: 1fr 1fr; }
        }

        .job-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--primary-red);
            width: 100%;
            text-align: left;
            padding: 15px;
            box-sizing: border-box;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .job-code {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--primary-red);
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .job-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.3;
        }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #000;
            border: 1px solid var(--border-color);
            padding: 25px;
            width: 90%;
            max-width: 400px;
            color: white;
            text-align: center;
        }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; color: #555; font-size: 11px; margin-bottom: 5px; text-transform: uppercase; }
        .form-input { width: 100%; background: #111; border: 1px solid var(--border-color); color: white; padding: 10px; box-sizing: border-box; font-family: monospace; }
        .modal-btn {
            background: transparent;
            color: var(--primary-red);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            font-family: monospace;
            cursor: pointer;
            text-transform: uppercase;
        }
        .modal-btn.submit { background: var(--primary-red); color: black; border-color: var(--primary-red); }

        /* --- БЛОК ИНФОРМАЦИИ (ВМЕСТО ALERT) --- */
        #infoOutput {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--primary-red);
            text-align: left;
            display: none;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- ФОН: СЕТКА + ЛЕГКИЙ ШУМ (НЕ ЛАГАЕТ) -->
    <div class="background-layer"></div>
    <div class="noise-overlay"></div>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="boot-screen">
        <div class="boot-log">INITIALIZING CORE...</div>
        <div class="boot-log">LOADING PROTOCOLS...</div>
        <div class="boot-log">CONNECTING TO SERVER...</div>
        <div class="boot-status" id="bootStatus">[ СИСТЕМА ЗАГРУЖАЕТСЯ ]</div>
        <div style="margin-top: 20px; font-size: 10px; color: #444;">ACCESS GRANTED IN 3...</div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕЙНЕР -->
    <div class="screen-container">
        
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="screen-main" class="screen">
            <div class="title-red">[ ГЛАВНОЕ МЕНЮ ]</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 15px;">
                <button class="btn" onclick="showInfo('elite')">КТО ТАКИЕ ELITE?</button>
                <button class="btn" onclick="showInfo('rules')">УСТАВ</button>
            </div>
            <button class="btn" style="grid-column: 1 / -1;" onclick="goToJobs()">ВАКАНСИИ</button>
            
            <div id="infoOutput"></div>
        </div>

        <!-- ЭКРАН ВАКАНСИЙ -->
        <div id="screen-jobs" class="screen">
            <div class="title-red">[ ВАКАНСИИ ]</div>
            
            <div class="jobs-grid">
                <!-- КАРТОЧКА 1: C17.MPF... -->
                <div class="job-card">
                    <span class="job-code" id="code1"></span>
                    <span class="job-desc" id="desc1"></span>
                </div>

                <!-- КАРТОЧКА 2: C17.OTA... -->
                <div class="job-card">
                    <span class="job-code" id="code2"></span>
                    <span class="job-desc" id="desc2"></span>
                </div>
            </div>

            <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn" onclick="openModal()">ПОДАТЬ ЗАЯВКУ</button>
                <button class="btn" onclick="goToMain()">НАЗАД В МЕНЮ</button>
            </div>
        </div>

    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="applyModal" class="modal-overlay">
        <div class="modal-content">
            <div style="color:var(--primary-red); margin-bottom: 15px; text-transform: uppercase; font-size: 14px;">[ ПОДАЧА ЗАЯВКИ ]</div>
            <form onsubmit="submitForm(event)">
                <div class="form-group">
                    <label class="form-label">КОД ВАКАНСИИ</label>
                    <input type="text" id="modalCode" class="form-input" readonly value="LOADING...">
                </div>
                <div class="form-group">
                    <label class="form-label">ВАШ ID ИЛИ НИКНЕЙМ</label>
                    <input type="text" id="modalNick" class="form-input" placeholder="Например: #12345" required>
                </div>
                <div class="form-group">
                    <label class="form-label">ПРИЧИНА ПОДАЧИ</label>
                    <input type="text" id="modalReason" class="form-input" placeholder="Почему вы хотите вступить?" required>
                </div>
                <div style="margin-top: 20px; display: flex; justify-content: center; gap: 10px;">
                    <button type="submit" class="modal-btn submit">ОТПРАВИТЬ</button>
                    <button type="button" class="modal-btn" onclick="closeModal()">ЗАКРЫТЬ</button>
                </div>
            </form>
        </div>
    </div>

<script>
    // --- ДАННЫЕ (ТВОИ КОДЫ) ---
    const jobsData = [
        {
            code: "C17.MPF.ELITE.JURY.OFC",
            desc: "Юнит Гражданской Обороны. Слежка за соблюдением устава. Требуется высокая дисциплина."
        },
        {
            code: "C17.OTA.ELITE.LEGION",
            desc: "Экспериментальные единицы ОТА. Высокий уровень угрозы. Только для опытных бойцов."
        }
    ];

    // --- ЛОГИКА ЗАГРУЗКИ ---
    const bootScreen = document.getElementById('boot-screen');
    const bootStatus = document.getElementById('bootStatus');
    
    setTimeout(() => {
        bootStatus.innerText = "[ ДОСТУП РАЗРЕШЁН ]";
        setTimeout(() => {
            bootScreen.style.opacity = '0';
            setTimeout(() => {
                bootScreen.style.display = 'none';
                document.getElementById('screen-main').classList.add('active');
            }, 500);
        }, 1000);
    }, 3000);

    // --- ПЕРЕХОДЫ ---
    function goToJobs() {
        document.getElementById('infoOutput').style.display = 'none';
        document.getElementById('screen-main').classList.remove('active');
        document.getElementById('screen-jobs').classList.add('active');
        typeWriterEffect();
    }

    function goToMain() {
        document.getElementById('screen-jobs').classList.remove('active');
        document.getElementById('screen-main').classList.add('active');
        document.getElementById('infoOutput').style.display = 'none';
    }

    // --- ТЕКСТ В МЕНЮ (БЕЗ ALERT) ---
    function showInfo(type) {
        const output = document.getElementById('infoOutput');
        if (type === 'elite') {
            output.innerHTML = '<b>[ ELITE LEGION ]</b><br><br>Элитное подразделение специального назначения.<br>Создано для выполнения задач, где обычные силы бессильны.<br><br><span style="color:#555">Статус: Активно</span>';
        } else if (type === 'rules') {
            output.innerHTML = '<b>[ УСТАВ ]</b><br><br>1. Приказ старшего по званию — закон.<br>2. Не разглашать секретные данные.<br>3. Соблюдать субординацию.<br><br><span style="color:#555">Нарушение карается дисциплинарным взысканием.</span>';
        }
        output.style.display = 'block';
    }

    // --- ЭФФЕКТ ПЕЧАТНОЙ МАШИНКИ ---
    function typeWriterEffect() {
        const code1 = document.getElementById('code1');
        const desc1 = document.getElementById('desc1');
        const code2 = document.getElementById('code2');
        const desc2 = document.getElementById('desc2');

        // Сброс
        code1.innerText = ''; desc1.innerText = '';
        code2.innerText = ''; desc2.innerText = '';

        // Карточка 1
        let i = 0;
        const printCode1 = setInterval(() => {
            if (i < jobsData.code.length) {
                code1.innerText += jobsData.code.charAt(i);
                i++;
            } else {
                clearInterval(printCode1);
                let j = 0;
                const printDesc1 = setInterval(() => {
                    if (j < jobsData.desc.length) {
                        desc1.innerText += jobsData.desc.charAt(j);
                        j++;
                    } else {
                        clearInterval(printDesc1);
                    }
                }, 20);
            }
        }, 30);

        // Карточка 2 (с задержкой)
        setTimeout(() => {
            let k = 0;
            const printCode2 = setInterval(() => {
                if (k < jobsData.code.length) {
                    code2.innerText += jobsData.code.charAt(k);
                    k++;
                } else {
                    clearInterval(printCode2);
                    let l = 0;
                    const printDesc2 = setInterval(() => {
                        if (l < jobsData.desc.length) {
                            desc2.innerText += jobsData.desc.charAt(l);
                            l++;
                        } else {
                            clearInterval(printDesc2);
                        }
                    }, 20);
                }
            }, 30);
        }, 400);
    }

    // --- МОДАЛЬНОЕ ОКНО ---
    function openModal() {
        const firstCode = document.getElementById('code1').innerText || 'UNKNOWN';
        document.getElementById('modalCode').value = firstCode;
        document.getElementById('applyModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('applyModal').style.display = 'none';
    }

    function submitForm(e) {
        e.preventDefault();
        alert('Заявка успешно отправлена в штаб-квартиру Elite Legion.\n\nОжидайте ответа командования.');
        closeModal();
    }
</script>

</body>
</html>
