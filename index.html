<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Legion - Interface</title>
    <style>
        :root {
            --bg-color: #0b0b0d;
            --panel-bg: #121216;
            --accent-red: #ff1a4a;
            --text-main: #dcdcdc;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-red);
            text-align: center;
        }

        .boot-text {
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-bar-container {
            width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-red);
            transition: width 0.1s linear;
        }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
        .app-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1.title {
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            font-size: 22px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 0 0 10px rgba(255, 26, 74, 0.3);
        }

        .btn-primary {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
        .btn-primary:hover {
            background: var(--accent-red);
            color: #000;
        }

        /* Блок информации (Досье) */
        #info-block {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid var(--accent-red);
            color: var(--text-main);
            display: none;
            text-align: left;
            font-size: 12px;
            line-height: 1.5;
            width: 100%;
            box-sizing: border-box;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Скроллбар для блока информации */
        #info-block::-webkit-scrollbar {
            width: 4px;
        }
        #info-block::-webkit-scrollbar-thumb {
            background: var(--accent-red);
        }

        /* Секция вакансий */
        .section-title {
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            margin-top: 25px;
            margin-bottom: 15px;
            width: 100%;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .jobs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        @media (min-width: 400px) {
            .jobs-grid { grid-template-columns: 1fr 1fr; }
        }

        .job-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            padding: 12px;
            color: var(--text-main);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .job-card:hover {
            border-color: var(--accent-red);
            background: rgba(0, 0, 0, 0.5);
        }

        .job-code {
            font-weight: bold;
            color: var(--accent-red);
            font-size: 13px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .job-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.3;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #1a1a1f;
            padding: 25px;
            width: 90%;
            max-width: 350px;
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--accent-red);
        }
        .form-group { margin-bottom: 15px; }
        .form-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="boot-screen">
        <div class="boot-text">INITIALIZING CORE PROTOCOLS...</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="boot-progress"></div>
        </div>
        <div class="boot-text" style="margin-top: 10px; font-size: 10px; color: #555;">SECURE CONNECTION ESTABLISHED</div>
    </div>

    <!-- ОСНОВНОЕ МЕНЮ -->
    <div class="app-container">
        
        <!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ -->
        <div id="screen-menu" class="content-screen active-screen">
            <h1 class="title">[ МЕНЮ ]</h1>
            <button class="btn" onclick="showInfo('elite')">КТО ТАКИЕ ELITE?</button>
            <!-- Кнопка теперь ведет на ссылку -->
            <button class="btn" onclick="openUstavLink()">УСТАВ</button>
            <button class="btn btn-primary" style="margin-top: 20px;" onclick="goToJobs()">ВАКАНСИИ</button>
            
            <div id="info-block"></div>
        </div>

        <!-- ЭКРАН 2: ВАКАНСИИ -->
        <div id="screen-jobs" class="content-screen">
            <h1 class="title">[ ВАКАНСИИ ]</h1>
            
            <div class="section-title">ОТКРЫТЫЕ ПОЗИЦИИ</div>
            
            <div class="jobs-grid">
                <div class="job-card">
                    <span class="job-code">C17.MPF.ELITE.JURY.OFC</span>
                    <span class="job-desc">Юнит Гражданской Обороны. Контроль порядка. Требуется дисциплина.</span>
                </div>
                <div class="job-card">
                    <span class="job-code">C17.OTA.ELITE.LEGION</span>
                    <span class="job-desc">Экспериментальные единицы ОТА. Высокий риск. Только опытные.</span>
                </div>
            </div>

            <button class="btn btn-primary" onclick="openModal()">ПОДАТЬ ЗАЯВКУ</button>
            <button class="btn" onclick="goBack()">НАЗАД В МЕНЮ</button>
        </div>

    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--accent-red); margin-top:0; text-align:center; text-transform:uppercase;">ФОРМА ЗАЯВКИ</h3>
            <div class="form-group">
                <label style="color:#666; font-size:10px;">Код вакансии</label>
                <input type="text" id="modal-code" class="form-input" readonly value="C17.MPF.ELITE.JURY.OFC">
            </div>
            <div class="form-group">
                <label style="color:#666; font-size:10px;">Никнейм</label>
                <input type="text" class="form-input" placeholder="Ваш ник" required>
            </div>
            <button class="btn btn-primary" style="width:auto; margin:0 auto; display:block;" onclick="submitApp()">ОТПРАВИТЬ</button>
            <button class="btn" style="width:auto; margin:10px auto 0; display:block; background:none; color:#666;" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

<script>
    // --- ЛОГИКА ЗАГРУЗКИ ---
    const bootScreen = document.getElementById('boot-screen');
    const progressBar = document.getElementById('boot-progress');
    let progress = 0;

    const timer = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 100) progress = 100;
        progressBar.style.width = progress + '%';
        
        if (progress >= 100) {
            clearInterval(timer);
            bootScreen.style.opacity = '0';
            setTimeout(() => {
                bootScreen.style.display = 'none';
            }, 500);
        }
    }, 150);

    // --- ФУНКЦИИ ПЕРЕХОДОВ ---
    function goToJobs() {
        document.getElementById('screen-menu').classList.remove('active-screen');
        document.getElementById('screen-jobs').classList.add('active-screen');
    }

    function goBack() {
        document.getElementById('screen-jobs').classList.remove('active-screen');
        document.getElementById('screen-menu').classList.add('active-screen');
        document.getElementById('info-block').style.display = 'none';
    }

    // --- ИНФОРМАЦИЯ В МЕНЮ (Твой текст) ---
    function showInfo(type) {
        const block = document.getElementById('info-block');
        block.style.display = 'block';
        block.scrollTop = 0; // Прокрутка вверх при открытии
        
        if(type === 'elite') {
            block.innerHTML = `
                <b>[ ELITE LEGION ]</b><br><br>
                Гвардия отдела Metro Police Forces и Overwatch Transhuman Arms. Одно из подразделений, созданное Генеральным Штабом Сити-17.<br><br>
                В данное подразделение входят строго лучшие юниты из рядов всех Гарнизонов ГО и OTA.<br><br>
                Подразделение имеет дополнительные корпуса: Корпус юстиции и Корпус Командования.<br><br>
                Подразделение занимается строгим надзором за соблюдением устава среди остальных юнитов ГО, а в случае нарушения — его пресечением и вынесением приговора.<br><br>
                Для остальных юнитов ГО эти бойцы являются строгим образцом и фигурой, на которую стоит ровняться.
            `;
        }
    }

    // --- ОТКРЫТИЕ УСТАВА (ССЫЛКА) ---
    function openUstavLink() {
        const url = "https://docs.google.com/document/d/12YHZ9wqK59BK2zrPSvtvBxufcNWw3qUcNFpjO8pY9pU/edit?tab=t.0#heading=h.xqwqc34o5l3v";
        window.open(url, "_blank");
    }

    // --- МОДАЛЬНОЕ ОКНО ---
    function openModal() {
        document.getElementById('myModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('myModal').style.display = 'none';
    }

    function submitApp() {
        alert('Заявка успешно отправлена в штаб-квартиру Elite Legion.');
        closeModal();
    }
</script>

</body>
</html>
