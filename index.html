<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Legion - Interface</title>
    <style>
        :root {
            --bg-color: #0f0f11;       /* Темно-серый вместо черного */
            --panel-bg: #1a1a1d;       /* Чуть светлее панель */
            --accent-red: #ff3333;     /* Яркий красный */
            --text-main: #e0e0e0;      /* Светло-серый текст */
            --border-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Контейнер сайта - его будет видно на любом фоне */
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Экран загрузки */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-red);
            font-size: 14px;
        }

        /* Скрытие контента пока грузится */
        .content-screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }
        .active-screen {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1.title {
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--accent-red);
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--accent-red);
            color: #000;
        }

        /* Карточки вакансий */
        .jobs-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 400px) {
            .jobs-grid { grid-template-columns: 1fr 1fr; }
        }

        .job-card {
            background: #000;
            border: 1px solid var(--border-color);
            padding: 15px;
            color: var(--accent-red);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .job-code {
            font-family: inherit;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .job-desc {
            font-size: 11px;
            color: #666;
            line-height: 1.3;
        }

        /* Блок информации вместо alert */
        #info-block {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--accent-red);
            display: none;
            text-align: left;
        }

        /* Модальное окно */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a1d;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }
        .form-group { margin-bottom: 10px; }
        .form-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loader">
        <p>INITIALIZING SYSTEM...</p>
        <p id="load-status">Loading assets: 0%</p>
    </div>

    <div class="app-container">
        
        <!-- ЭКРАН 1: ГЛАВНОЕ МЕНЮ -->
        <div id="screen-menu" class="content-screen active-screen">
            <h1 class="title">[ МЕНЮ ]</h1>
            <button class="btn" onclick="showInfo('elite')">КТО ТАКИЕ ELITE?</button>
            <button class="btn" onclick="showInfo('rules')">УСТАВ</button>
            <button class="btn" style="margin-top: 20px;" onclick="goToJobs()">ВАКАНСИИ</button>
            
            <div id="info-block"></div>
        </div>

        <!-- ЭКРАН 2: ВАКАНСИИ -->
        <div id="screen-jobs" class="content-screen">
            <h1 class="title">[ ВАКАНСИИ ]</h1>
            
            <div class="jobs-grid">
                <!-- Карточка 1 -->
                <div class="job-card" id="card-1">
                    <span class="job-code" id="code-1"></span>
                    <span class="job-desc" id="desc-1"></span>
                </div>
                <!-- Карточка 2 -->
                <div class="job-card" id="card-2">
                    <span class="job-code" id="code-2"></span>
                    <span class="job-desc" id="desc-2"></span>
                </div>
            </div>

            <button class="btn" onclick="openModal()">ПОДАТЬ ЗАЯВКУ</button>
            <button class="btn" onclick="goBack()">НАЗАД В МЕНЮ</button>
        </div>

    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--accent-red); margin-top:0;">ЗАЯВКА</h3>
            <div class="form-group">
                <label style="color:#666; font-size:10px;">Код вакансии</label>
                <input type="text" id="modal-code" class="form-input" readonly>
            </div>
            <div class="form-group">
                <label style="color:#666; font-size:10px;">Никнейм</label>
                <input type="text" class="form-input" placeholder="Ваш ник" required>
            </div>
            <button class="btn" style="width:auto; margin:0 auto; display:block;" onclick="submitApp()">ОТПРАВИТЬ</button>
            <button class="btn" style="width:auto; margin:10px auto 0; display:block; background:none; color:#666;" onclick="closeModal()">ЗАКРЫТЬ</button>
        </div>
    </div>

<script>
    // ДАННЫЕ (Твои коды жестко прописаны здесь)
    const jobs = [
        { code: "C17.MPF.ELITE.JURY.OFC", desc: "Юнит Гражданской Обороны. Контроль порядка. Требуется дисциплина." },
        { code: "C17.OTA.ELITE.LEGION", desc: "Экспериментальные единицы ОТА. Высокий риск. Только опытные." }
    ];

    // --- ЛОГИКА ЗАГРУЗКИ ---
    const loader = document.getElementById('loader');
    const loadStatus = document.getElementById('load-status');
    
    // Имитация загрузки (чтобы ты видел, что сайт работает)
    let progress = 0;
    const timer = setInterval(() => {
        progress += 10;
        loadStatus.innerText = `Loading assets: \${progress}%`;
        if(progress >= 100) {
            clearInterval(timer);
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    }, 100);

    // --- ФУНКЦИИ ПЕРЕХОДОВ ---
    function goToJobs() {
        document.getElementById('screen-menu').classList.remove('active-screen');
        document.getElementById('screen-jobs').classList.add('active-screen');
        renderJobs();
    }

    function goBack() {
        document.getElementById('screen-jobs').classList.remove('active-screen');
        document.getElementById('screen-menu').classList.add('active-screen');
        document.getElementById('info-block').style.display = 'none';
    }

    // --- ОТРИСОВКА ВАКАНСИЙ (Мгновенная, без сложных эффектов) ---
    function renderJobs() {
        // Просто берем данные и вставляем в HTML
        document.getElementById('code-1').innerText = jobs.code;
        document.getElementById('desc-1').innerText = jobs.desc;
        
        document.getElementById('code-2').innerText = jobs.code;
        document.getElementById('desc-2').innerText = jobs.desc;
    }

    // --- ИНФОРМАЦИЯ В МЕНЮ ---
    function showInfo(type) {
        const block = document.getElementById('info-block');
        block.style.display = 'block';
        if(type === 'elite') {
            block.innerHTML = '<b>[ ELITE LEGION ]</b><br><br>Элитное подразделение специального назначения. Создано для выполнения задач, где обычные силы бессильны.';
        } else if(type === 'rules') {
            block.innerHTML = '<b>[ УСТАВ ]</b><br><br>1. Приказ старшего по званию — закон.<br>2. Не разглашать секретные данные.<br>3. Соблюдать субординацию.';
        }
    }

    // --- МОДАЛЬНОЕ ОКНО ---
    function openModal() {
        const code = document.getElementById('code-1').innerText || 'UNKNOWN';
        document.getElementById('modal-code').value = code;
        document.getElementById('myModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('myModal').style.display = 'none';
    }

    function submitApp() {
        alert('Заявка отправлена в штаб-квартиру Elite Legion.');
        closeModal();
    }
</script>

</body>
</html>
