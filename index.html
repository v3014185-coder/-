<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Elite Legion - Interface</title>
    <style>
        :root {
            --primary-red: #ff0033;
            --bg-black: #000000;
            --panel-dark: #050505;
            --text-white: #ffffff;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace; /* Строгий шрифт терминала */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .screen-container {
            width: 100%;
            max-width: 600px;
            min-height: 500px;
            background-color: var(--panel-dark);
            border: 2px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        /* --- ЭКРАНЫ --- */
        .screen {
            width: 100%;
            text-align: center;
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- ЗАГРУЗКА --- */
        .status-text {
            color: var(--primary-red);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #000;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary-red);
            transition: width 2s ease-out;
        }

        .access-status {
            color: #555;
            font-size: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            background: transparent;
            color: var(--primary-red);
            border: 2px solid var(--primary-red);
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.3);
            margin-bottom: 10px;
        }

        .btn:hover {
            background: var(--primary-red);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.8);
        }

        .btn-green {
            background: #0f0;
            color: #000;
            border-color: #0f0;
        }

        /* --- СТИЛИ МЕНЮ (КАК НА СКРИНЕ) --- */
        .menu-title {
            color: var(--primary-red);
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            display: inline-block;
            font-weight: bold;
        }

        .job-card {
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--primary-red);
            width: 100%;
            text-align: left;
            padding: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .job-code {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        .job-desc {
            font-size: 12px;
            color: #aaa;
            line-height: 1.4;
        }

        .action-buttons {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-full {
            width: 100%;
            margin-bottom: 0;
        }

        /* --- ЭФФЕКТ ПЕЧАТИ ТЕКСТА --- */
        .type-writer {
            overflow: hidden;
            border-right: 2px solid var(--primary-red);
            white-space: nowrap;
            letter-spacing: 2px;
            display: inline-block;
            animation: blink-caret 1s step-end infinite;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: var(--primary-red); }
        }
    </style>
</head>
<body>

<div class="screen-container">
    
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="screen-load" class="screen active">
        <div class="status-text" id="statusText">[ СИСТЕМА ЗАГРУЖАЕТСЯ ]</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="access-status" id="accessStatus">Ожидание авторизации…</div>
        <button id="activateBtn" class="btn" disabled>АКТИВИРОВАТЬ ДОСТУП</button>
    </div>

    <!-- ЭКРАН ВАКАНСИЙ (ТОТ САМЫЙ С СКРИНА) -->
    <div id="screen-jobs" class="screen">
        <div class="menu-title">[ ВАКАНСИИ ]</div>
        
        <!-- Карточка 1 -->
        <div class="job-card">
            <span class="job-code">C17.MPF.ELITE.JURY.OFC</span>
            <span class="job-desc">Юнит Гражданской Обороны. Слежка за соблюдением устава.</span>
        </div>

        <!-- Карточка 2 -->
        <div class="job-card">
            <span class="job-code">C17.OTA.ELITE.LEGION</span>
            <span class="job-desc">Экспериментальные единицы ОТА. Высокий уровень угрозы.</span>
        </div>

        <div class="action-buttons">
            <button id="btn-apply" class="btn btn-full">ПОДАТЬ ЗАЯВКУ</button>
            <button id="btn-back" class="btn btn-full">НАЗАД В МЕНЮ</button>
        </div>
    </div>

</div>

<script>
    // --- Элементы ---
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const accessStatus = document.getElementById('accessStatus');
    const activateBtn = document.getElementById('activateBtn');

    const screenLoad = document.getElementById('screen-load');
    const screenJobs = document.getElementById('screen-jobs');
    
    const btnApply = document.getElementById('btn-apply');
    const btnBack = document.getElementById('btn-back');

    // --- ЛОГИКА ЗАГРУЗКИ ---
    function startLoading() {
        let width = 0;
        const interval = setInterval(() => {
            width += Math.random() * 10;
            if (width > 100) width = 100;
            progressFill.style.width = width + '%';
            
            if (width >= 100) {
                clearInterval(interval);
                statusText.textContent = '[ СИСТЕМА ГОТОВА ]';
                accessStatus.textContent = 'Доступ разрешён. Нажмите кнопку для входа.';
                activateBtn.disabled = false;
            }
        }, 100);
    }

    // --- ЛОГИКА АКТИВАЦИИ ---
    activateBtn.addEventListener('click', () => {
        activateBtn.disabled = true;
        activateBtn.textContent = 'ПРОВЕРКА ДОСТУПА…';
        activateBtn.classList.add('btn-green');
        
        setTimeout(() => {
            statusText.textContent = '[ ДОСТУП РАЗРЕШЁН ]';
            accessStatus.textContent = 'Загрузка интерфейса…';
            activateBtn.textContent = 'ДОСТУП АКТИВИРОВАН';
            
            // ПАУЗА 4 СЕКУНДЫ ПЕРЕД ПОЯВЛЕНИЕМ МЕНЮ
            setTimeout(() => {
                screenLoad.classList.remove('active');
                screenJobs.classList.add('active');
                
                // ЗАПУСКАЕМ ЭФФЕКТ ПЕЧАТИ ТЕКСТА
                typeWriterEffect();
            }, 4000);
        }, 1500);
    });

    // --- ЭФФЕКТ ПЕЧАТИ ТЕКСТА (TYPEWRITER) ---
    function typeWriterEffect() {
        const cards = document.querySelectorAll('.job-card');
        
        cards.forEach((card, index) => {
            const code = card.querySelector('.job-code');
            const desc = card.querySelector('.job-desc');
            
            const codeText = code.textContent;
            const descText = desc.textContent;
            
            code.textContent = '';
            desc.textContent = '';
            
            // Печатаем код
            let i = 0;
            const printCode = setInterval(() => {
                if (i < codeText.length) {
                    code.textContent += codeText.charAt(i);
                    i++;
                } else {
                    clearInterval(printCode);
                    // Печатаем описание с небольшой задержкой
                    let j = 0;
                    const printDesc = setInterval(() => {
                        if (j < descText.length) {
                            desc.textContent += descText.charAt(j);
                            j++;
                        } else {
                            clearInterval(printDesc);
                        }
                    }, 30); // Скорость печати описания
                }
            }, 50); // Скорость печати кода
        });
    }

    // --- ОБРАБОТЧИКИ КНОПОК ---
    btnApply.addEventListener('click', () => {
        alert('Заявка отправлена в штаб. Ожидайте ответа.');
    });

    btnBack.addEventListener('click', () => {
        // Здесь можно добавить логику возврата в главное меню, если оно будет
        alert('Возврат в главное меню...');
    });

    // Старт
    startLoading();
</script>

</body>
</html>
