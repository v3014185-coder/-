<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Elite Legion - Interface</title>
    <style>
        :root {
            --primary-red: #ff0033;
            --bg-black: #000000;
            --panel-dark: #050505;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .screen-container {
            width: 100%;
            max-width: 600px;
            min-height: 500px;
            background-color: var(--panel-dark);
            border: 2px solid #333;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .status-text {
            color: var(--primary-red);
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #000;
            border: 1px solid #333;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary-red);
            transition: width 2s ease-out;
        }

        .access-status {
            color: #555;
            font-size: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            background: transparent;
            color: var(--primary-red);
            border: 2px solid var(--primary-red);
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.3);
        }

        .btn:hover {
            background: var(--primary-red);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.8);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="screen-container">
    <div class="status-text" id="statusText">[ СИСТЕМА ЗАГРУЖАЕТСЯ ]</div>
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="access-status" id="accessStatus">Ожидание авторизации…</div>
    <button class="btn" id="activateBtn">АКТИВИРОВАТЬ ДОСТУП</button>
</div>

<script>
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const accessStatus = document.getElementById('accessStatus');
    const activateBtn = document.getElementById('activateBtn');

    // Имитация загрузки системы
    function startLoading() {
        let width = 0;
        const interval = setInterval(() => {
            width += 2;
            progressFill.style.width = width + '%';
            if (width >= 100) {
                clearInterval(interval);
                statusText.textContent = '[ СИСТЕМА ГОТОВА ]';
                accessStatus.textContent = 'Доступ разрешён. Нажмите кнопку для входа.';
                activateBtn.disabled = false;
            }
        }, 50);
    }

    // Обработка клика по кнопке
    activateBtn.addEventListener('click', () => {
        activateBtn.disabled = true;
        activateBtn.textContent = 'ПРОВЕРКА ДОСТУПА…';
        accessStatus.textContent = 'Проверка учётных данных…';

        setTimeout(() => {
            statusText.textContent = '[ ДОСТУП РАЗРЕШЁН ]';
            accessStatus.textContent = 'Авторизация успешна. Загрузка интерфейса…';
            activateBtn.textContent = 'ДОСТУП АКТИВИРОВАН';
            activateBtn.style.backgroundColor = '#0f0';
            activateBtn.style.color = '#000';
            activateBtn.style.borderColor = '#0f0';
        }, 1500);
    });

    // Запуск при загрузке страницы
    startLoading();
</script>

</body>
</html>
